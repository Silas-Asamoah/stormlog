name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, release/v0.2-readiness]
    schedule:
        - cron: "0 3 * * *"

jobs:
    test:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12"]
                framework: [pytorch, tensorflow]
                exclude:
                    - python-version: "3.12"
                      framework: tensorflow

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v4
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Cache pip dependencies
              uses: actions/cache@v3
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-${{ matrix.python-version }}-

            - name: Install base dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install -e . --no-deps
                  pip install -r requirements-ci-base.txt

            - name: Install framework dependencies
              run: |
                  if [ "${{ matrix.framework }}" = "pytorch" ]; then
                      pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
                  else
                      pip install tensorflow-cpu==2.15.0
                  fi

            - name: Run tests
              run: |
                  if [ "${{ matrix.framework }}" = "pytorch" ]; then
                      python3 -m pytest tests/ --ignore-glob="tests/test_tf*.py" -v -m "not tui_pilot and not tui_snapshot and not tui_pty" --cov=stormlog --cov-report=xml
                  else
                      python3 -m pytest tests/ -o "python_files=test_tf*.py" -v -m "not tui_pilot and not tui_snapshot and not tui_pty" --cov=stormlog --cov-report=xml
                  fi

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  file: ./coverage.xml
                  flags: unittests
                  name: codecov-umbrella

    tui-pr-gate:
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Cache pip dependencies
              uses: actions/cache@v3
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-tui-pr-${{ hashFiles('pyproject.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-tui-pr-

            - name: Install TUI test dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install -e . --no-deps
                  pip install -r requirements-ci-base.txt
                  pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

            - name: Run TUI pilot and snapshot suites
              run: |
                  python3 -m pytest tests/tui/ -m "tui_pilot or tui_snapshot" -v

    tui-pty-smoke:
        if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Cache pip dependencies
              uses: actions/cache@v3
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-tui-pty-${{ hashFiles('pyproject.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-tui-pty-

            - name: Install PTY test dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install -e . --no-deps
                  pip install -r requirements-ci-base.txt
                  pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

            - name: Run TUI PTY smoke suite
              run: |
                  python3 -m pytest tests/e2e/test_tui_pty.py -m tui_pty -v

    lint:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.10"]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v4
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  # Lint does not require heavy runtime ML dependencies.
                  pip install -e . --no-deps
                  pip install -r requirements-ci-lint.txt

            - name: Run isort
              run: |
                  python3 -m isort --check --diff stormlog/ tests/ examples/

            - name: Run black
              run: |
                  python3 -m black --check stormlog/ tests/ examples/

            - name: Run flake8
              run: |
                  python3 -m flake8 stormlog/ tests/ examples/ --show-source --statistics

            - name: Run mypy
              run: |
                  python3 -m mypy stormlog/

    docs:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Cache pip dependencies
              uses: actions/cache@v3
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-docs-${{ hashFiles('pyproject.toml', 'docs/requirements-rtd.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-docs-

            - name: Install docs dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install -e . --no-deps
                  pip install -r docs/requirements-rtd.txt

            - name: Build docs with warnings as errors
              run: |
                  python3 -m sphinx -W --keep-going -b html docs docs/_build/html

    build:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        needs: [test, lint, docs]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install build dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install build twine

            - name: Build package
              run: |
                  python3 -m build

            - name: Check package
              run: |
                  twine check dist/*

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/

    artifact-cli-smoke:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        needs: [build]

        steps:
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist

            - name: Install built wheel in a fresh environment
              run: |
                  python3 -m venv .venv-wheel-smoke
                  . .venv-wheel-smoke/bin/activate
                  python -m pip install --upgrade pip
                  WHEEL_PATH="$(python3 - <<'PY'
                  from pathlib import Path

                  wheels = sorted(Path("dist").glob("stormlog-*.whl"))
                  if len(wheels) != 1:
                      raise SystemExit(
                          f"Expected exactly one wheel in dist/, found {len(wheels)}."
                      )
                  print(wheels[0].resolve())
                  PY
                  )"
                  pip install "$WHEEL_PATH"
                  pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

            - name: Smoke test documented CLI workflow from the wheel
              env:
                  CUDA_VISIBLE_DEVICES: ""
              run: |
                  . .venv-wheel-smoke/bin/activate
                  mkdir -p smoke
                  cd smoke
                  gpumemprof --help
                  gpumemprof info
                  gpumemprof track --duration 1 --interval 0.2 --output track.json --format json
                  gpumemprof analyze track.json --format txt --output analysis.txt
                  test -s track.json
                  test -s analysis.txt

    examples-smoke:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        needs: [test, lint, docs]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install source-checkout example dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install -e . --no-deps
                  pip install -r requirements-ci-base.txt

            - name: Run source-checkout example smoke tests
              run: |
                  python3 -m examples.cli.quickstart
                  python3 -m examples.cli.capability_matrix --mode smoke --target auto --oom-mode simulated --skip-tui
